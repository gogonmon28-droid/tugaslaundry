<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pelanggan Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>

        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            max-width: 100%;
            font-size: 13.5px;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        body {
            background:
                linear-gradient(rgba(255, 255, 255, 0.92),
                    rgba(255, 255, 255, 0.92)),
                url('https://images.unsplash.com/photo-1626806787461-102c1bfaaea1');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .navbar-custom {
            background: white;
            padding: 14px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
            margin-bottom: 14px;
        }

        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, .08);
        }

        .sidebar {
            width: 210px;
            flex-shrink: 0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a, #2563eb);
            padding: 14px;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: white;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 700;
            font-size: 18px;
        }

        .sidebar a {
            display: block;
            padding: 9px 12px;
            margin-bottom: 6px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: .3s;
            font-size: 13px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, .2);
        }

        .sidebar a.active {
            background: rgba(255, 255, 255, .25);
            font-weight: 600;
        }

        .main {
            flex: 1;
            min-width: 0;
            margin-left: 210px;
        }

        h3 { font-size: 16px; font-weight: 600; }
        h4 { font-size: 15px; }
        h5 { font-size: 13.5px; }

        .form-control, .form-select {
            font-size: 13px;
            padding: 6px 10px;
        }

        .btn { font-size: 13px; padding: 6px 14px; }
        .btn-sm { font-size: 12px; padding: 4px 10px; }

        .table { font-size: 13px; }
        .table th, .table td { padding: 8px 10px; }

    </style>
</head>
<body>
    <div class="app-layout">

    <div class="sidebar">
        <h2>🧺 Laundry</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="pelanggan.html" class="active">👥 Pelanggan</a>
        <a href="layanan.html">🧼 Layanan</a>
        <a href="pesanan.html">📦 Pesanan</a>
        <a href="transaksi.html">💰 Transaksi</a>
        <a href="laporan.html">📊 Laporan</a>
        <a href="../index.html">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="container-fluid p-3">
            <div class="card p-3">
                <h3 class="mb-3">Tambah Pelanggan</h3>
                <div class="row g-2">
                    <div class="col-md-4 mb-2">
                        <input type="text" id="nama" class="form-control" placeholder="Nama Pelanggan">
                    </div>
                    <div class="col-md-4 mb-2">
                        <input type="text" id="alamat" class="form-control" placeholder="Alamat">
                    </div>
                    <div class="col-md-4 mb-2">
                        <input type="text" id="telepon" class="form-control" placeholder="Nomor Telepon">
                    </div>
                </div>
                <button class="btn btn-primary mt-1" onclick="tambahPelanggan()">+ Tambah Pelanggan</button>
            </div>
            <div class="card p-3 mt-3">
                <h3>Daftar Pelanggan</h3>
                <table class="table table-striped table-hover mt-2">
                    <thead class="table-primary">
                        <tr><th>ID</th><th>Nama</th><th>Alamat</th><th>Telepon</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="dataPelanggan">
                        <tr>
                            <td>1</td><td>Thelma Diana</td><td>Fakfak</td><td>08123456789</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editBaris(this)">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="hapusBaris(this)">Hapus</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        let nomor = 2;
        function tambahPelanggan() {
            let nama = document.getElementById("nama").value;
            let alamat = document.getElementById("alamat").value;
            let telepon = document.getElementById("telepon").value;
            if (nama == "" || alamat == "" || telepon == "") { alert("Silakan lengkapi data terlebih dahulu"); return; }
            let tabel = document.getElementById("dataPelanggan");
            let row = tabel.insertRow();
            row.innerHTML = `<td>${nomor++}</td><td>${nama}</td><td>${alamat}</td><td>${telepon}</td>
<td><button class="btn btn-warning btn-sm" onclick="editBaris(this)">Edit</button>
<button class="btn btn-danger btn-sm" onclick="hapusBaris(this)">Hapus</button></td>`;
            document.getElementById("nama").value = "";
            document.getElementById("alamat").value = "";
            document.getElementById("telepon").value = "";
        }
        function hapusBaris(btn) { if (confirm("Yakin ingin menghapus data?")) btn.parentElement.parentElement.remove(); }
        function editBaris(btn) {
            let row = btn.parentElement.parentElement;
            let nama = prompt("Edit Nama", row.cells[1].innerText);
            let alamat = prompt("Edit Alamat", row.cells[2].innerText);
            let telepon = prompt("Edit Telepon", row.cells[3].innerText);
            if (nama) row.cells[1].innerText = nama;
            if (alamat) row.cells[2].innerText = alamat;
            if (telepon) row.cells[3].innerText = telepon;
        }
    </script>
    </div>
</body>
</html>
