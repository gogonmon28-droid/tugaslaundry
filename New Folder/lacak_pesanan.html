<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lacak Pesanan Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
      body {
        font-family: Poppins, sans-serif;
        background: linear-gradient(135deg, #f4f8fc 0%, #eef6ff 100%);
        margin: 0;
        padding: 0;
        font-size: 13.5px;
      }

      .navbar {
        background: linear-gradient(90deg, #0d6efd, #00a2ff);
        padding: 8px 0;
      }
      .navbar-brand { font-size: 16px; }
      .nav-link, .btn { font-size: 13px; }

      .page-wrap {
        min-height: calc(100vh - 56px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 14px;
      }

      .tracking-card {
        width: 100%;
        max-width: 560px;
        background: linear-gradient(145deg, #ffffff, #f7fbff);
        padding: 24px;
        border-radius: 18px;
        box-shadow: 0 14px 35px rgba(13, 110, 253, 0.12);
        border: 1px solid rgba(13, 110, 253, 0.08);
      }

      .tracking-header {
        text-align: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #eaf2ff;
      }

      h2 {
        color: #0d6efd;
        margin-bottom: 4px;
        font-weight: 700;
        font-size: 18px;
      }

      .subtitle {
        color: #6c757d;
        margin: 0;
        font-size: 13px;
      }

      .form-control {
        border-radius: 10px;
        padding: 10px 12px;
        border: 1px solid #dce8f7;
        font-size: 13px;
      }

      .btn-blue-black {
        background: linear-gradient(90deg, #0d6efd, #00a2ff);
        color: #000 !important;
        font-weight: 700;
        border: none;
        padding: 10px;
        border-radius: 10px;
        display: block;
        width: 100%;
        text-align: center;
        margin-top: 10px;
        text-decoration: none;
        font-size: 13.5px;
      }
      .btn-blue-black:hover { opacity: .95; color: #000 !important; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="fa-solid fa-shirt"></i> Laundry Premium
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#layanan">Layanan</a></li>
            <li class="nav-item"><a class="nav-link active" href="lacak_pesanan.html">Progress cucian</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#harga">Harga</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#kontak">Kontak</a></li>
            <li class="nav-item ms-2">
              <a href="admin/admin-login.html" class="btn btn-warning btn-sm">Login Admin</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="tracking-card">
        <div class="tracking-header">
          <h2><i class="fa-solid fa-shirt"></i> Progress Cucian Laundry</h2>
          <p class="subtitle">Masukkan kode untuk melihat status cucian Anda.</p>
        </div>
        <input type="text" id="kode" class="form-control" placeholder="Masukkan Kode" />
        <a href="progress-cucian.html" class="btn-blue-black">Progress Cucian</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
