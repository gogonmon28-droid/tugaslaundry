<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Laundry Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Poppins, sans-serif;
        font-size: 13.5px;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("https://images.unsplash.com/photo-1626806787461-102c1bfaaea1");
        background-size: cover;
        background-position: center;
      }
      .login-box {
        width: 370px;
        padding: 30px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
        color: white;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }
      .btn-login {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        font-weight: bold;
        font-size: 14px;
      }
      label { font-size: 13px; }
      .form-control { font-size: 13px; padding: 8px 12px; }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="text-center mb-3">
        <div style="font-size:45px">🧺</div>
        <h2 style="font-size:20px; margin-top:6px">Login Admin</h2>
      </div>
      <div class="mb-3">
        <label>Username</label>
        <input type="text" id="username" class="form-control" placeholder="Masukkan Username" />
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Masukkan Password" />
      </div>
      <button class="btn btn-primary btn-login" onclick="loginAdmin()">Login</button>
      <div class="text-center mt-3">
        <p class="small text-white-50 mb-1">Open Source - Data hanya tercatat di panel admin.</p>
        <a href="../index.html" class="text-warning" style="font-size:13px">Kembali ke Beranda</a>
      </div>
    </div>
    <script>
      function loginAdmin() {
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
